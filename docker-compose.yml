services:
  postgres:
    image: postgres:15
    container_name: tinder-languages-postgres
    environment:
      POSTGRES_DB: tinder_languages_db
      POSTGRES_USER: tinder_user
      POSTGRES_PASSWORD: tinder_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinder_user -d tinder_languages_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
