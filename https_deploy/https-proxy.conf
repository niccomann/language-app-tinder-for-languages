# TLS-terminating reverse proxy in front of language-frontend.
# Cloudflare (Full mode) -> this :443 -> language-frontend:80.
server {
    listen 443 ssl;
    server_name customizeyourlingua.com www.customizeyourlingua.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Re-resolve the upstream via Docker's embedded DNS so a frontend container
    # restart (new IP) does not leave us caching a dead address.
    resolver 127.0.0.11 valid=10s;
    set $upstream "language-frontend:80";

    location / {
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
