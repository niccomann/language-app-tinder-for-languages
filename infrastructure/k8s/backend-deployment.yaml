apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tinder-languages
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 664111151564.dkr.ecr.eu-central-1.amazonaws.com/tinder-languages-backend:latest
          ports:
            - containerPort: 8500
          env:
            - name: PORT
              value: "8500"
            - name: HOST
              value: "0.0.0.0"
            - name: USE_SQLITE
              value: "true"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: openai-api-key
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8500
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: tinder-languages
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8500
      targetPort: 8500
  type: ClusterIP
