apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: tinder-languages
type: Opaque
stringData:
  postgres-user: "tinder_user"
  postgres-password: "YOUR_SECURE_PASSWORD_HERE"
  database-url: "postgresql://tinder_user:YOUR_SECURE_PASSWORD_HERE@postgres-service:5432/tinder_languages_db"
  openai-api-key: "YOUR_OPENAI_API_KEY_HERE"
